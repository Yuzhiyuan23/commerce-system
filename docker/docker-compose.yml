version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: commerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: commerce_system
      MYSQL_USER: commerce
      MYSQL_PASSWORD: commerce123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: commerce-redis
    restart: always
    volumes:
      - redis_data:/data

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile-backend
    container_name: commerce-backend
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=commerce_system
      - DB_USERNAME=commerce
      - DB_PASSWORD=commerce123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}

  # 前端服务
  frontend:
    build:
      context: ../frontend/next-app
      dockerfile: ../../docker/Dockerfile-frontend
    container_name: commerce-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: commerce-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  redis_data:
