spring:
  datasource:
    url: jdbc:mysql://localhost:3306/commerce_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME:commerce}
    password: ${DB_PASSWORD:commerce123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    session:
      cookie:
        secure: false
        same-site: lax
        max-age: 604800
  cache:
    type: simple

server:
  port: 8080
  forward-headers-strategy: native

commerce:
  security:
    session-cookie-name: COMMERCE_SYSTEM_SESSION
  cache:
    enabled: false
  analytics:
    hourly-snapshot-cron: "0 0 2 * * *"
    daily-summary-cron: "0 30 3 * * *"
    anomaly-check-cron: "0 0 4 * * *"
  payment:
    close-expired:
      fixed-delay-ms: 300000
  fulfillment:
    auto-complete:
      fixed-delay-ms: 600000
  recommendation:
    gorse:
      enabled: false

logging:
  level:
    root: WARN
    com.commerce: INFO
  file:
    name: C:/commerce-system/logs/app.log
