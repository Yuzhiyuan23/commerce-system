spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/commerce_system?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    session:
      cookie:
        secure: true
        same-site: lax
        max-age: 604800  # 7天

server:
  forward-headers-strategy: native

logging:
  level:
    root: WARN
    com.commerce: INFO
  file:
    name: /var/log/commerce-system/app.log
