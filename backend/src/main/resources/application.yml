spring:
  application:
    name: commerce-system-backend
  profiles:
    active: ${APP_PROFILE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:commerce_system}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:commerce}
    password: ${DB_PASSWORD:commerce123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
management:
  endpoints:
    web:
      exposure:
        include: health,info
server:
  port: ${SERVER_PORT:8080}
commerce:
  security:
    session-cookie-name: COMMERCE_SYSTEM_SESSION
  cache:
    enabled: ${CACHE_ENABLED:false}
  events:
    publisher: ${EVENT_PUBLISHER:local}
  rocketmq:
    enabled: ${ROCKETMQ_ENABLED:false}
    name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  analytics:
    hourly-snapshot-cron: "${ANALYTICS_HOURLY_SNAPSHOT_CRON:0 5 * * * *}"
    daily-summary-cron: "${ANALYTICS_DAILY_SUMMARY_CRON:0 30 0 * * *}"
    anomaly-check-cron: "${ANALYTICS_ANOMALY_CHECK_CRON:0 10 * * * *}"
  payment:
    close-expired:
      fixed-delay-ms: 60000
  fulfillment:
    auto-complete:
      fixed-delay-ms: 300000
  recommendation:
    gorse:
      enabled: ${GORSE_ENABLED:false}
      endpoint: ${GORSE_ENDPOINT:http://localhost:8088}
      timeout: ${GORSE_TIMEOUT:2s}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
oss:
  endpoint: oss-cn-chengdu.aliyuncs.com
  bucket: commerce-system
  region: cn-chengdu
  access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret}
  base-dir: products/
